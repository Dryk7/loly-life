<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2a1f3d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
  <title>Loly Life · 3D</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="boot">
    <div class="boot-card">
      <h1>Loly Life</h1>
      <p class="tagline">Une petite vie à mener.</p>

      <div class="preview-wrap">
        <canvas id="preview-canvas" width="96" height="120"></canvas>
      </div>

      <label>Prénom</label>
      <input id="name-input" type="text" maxlength="14" placeholder="Ton prénom" autocomplete="off">

      <div class="picker-row">
        <span class="picker-label">Genre</span>
        <div class="swatches text" data-picker="gender"></div>
      </div>
      <div class="picker-row">
        <span class="picker-label">Peau</span>
        <div class="swatches" data-picker="skin"></div>
      </div>
      <div class="picker-row">
        <span class="picker-label">Cheveux</span>
        <div class="swatches" data-picker="hair"></div>
      </div>
      <div class="picker-row">
        <span class="picker-label">Coupe</span>
        <div class="swatches text" data-picker="hairStyle"></div>
      </div>
      <div class="picker-row">
        <span class="picker-label">Vêtement</span>
        <div class="swatches text" data-picker="top"></div>
      </div>
      <div class="picker-row">
        <span class="picker-label">Couleur haut</span>
        <div class="swatches" data-picker="shirt"></div>
      </div>
      <div class="picker-row">
        <span class="picker-label">Style bas</span>
        <div class="swatches text" data-picker="bottom"></div>
      </div>
      <div class="picker-row">
        <span class="picker-label">Couleur bas</span>
        <div class="swatches" data-picker="pants"></div>
      </div>

      <div class="boot-actions">
        <button id="start-btn">Commencer</button>
        <button id="continue-btn" hidden>Continuer</button>
      </div>
    </div>
  </div>

  <div id="game" hidden>
    <header id="hud-top">
      <div class="needs">
        <div class="need" data-need="hunger"><span class="need-icon">🍽</span><div class="bar"><div class="fill"></div></div></div>
        <div class="need" data-need="energy"><span class="need-icon">⚡</span><div class="bar"><div class="fill"></div></div></div>
        <div class="need" data-need="hygiene"><span class="need-icon">🚿</span><div class="bar"><div class="fill"></div></div></div>
        <div class="need" data-need="social"><span class="need-icon">💬</span><div class="bar"><div class="fill"></div></div></div>
        <div class="need" data-need="fun"><span class="need-icon">🎉</span><div class="bar"><div class="fill"></div></div></div>
      </div>
      <div class="hud-row">
        <div class="chip" id="chip-money">$0</div>
        <div class="chip" id="chip-time">Jour 1 · 08:00</div>
        <button class="chip menu-btn" id="menu-btn" aria-label="Menu">⚙</button>
      </div>
    </header>

    <main id="stage">
      <canvas id="canvas"></canvas>
      <div id="action-panel" hidden>
        <div class="action-label">Action</div>
        <div class="action-bar"><div class="action-fill"></div></div>
        <button id="cancel-action">Annuler</button>
      </div>
      <div id="emote" hidden></div>
    </main>

    <footer id="hud-bottom">
      <button class="action-btn" data-quick="call">📞 Appeler un ami</button>
      <button class="action-btn" data-quick="sleep">😴 Dormir</button>
    </footer>

    <div id="modal" class="modal" hidden>
      <div class="modal-card">
        <h2 id="modal-title">Pause</h2>
        <div id="modal-body"></div>
        <div class="modal-actions">
          <button id="modal-close">Reprendre</button>
        </div>
      </div>
    </div>

    <div id="toast" hidden></div>
  </div>

  <script src="game.js" type="module"></script>
</body>
</html>
